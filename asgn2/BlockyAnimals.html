<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Change a point color</title>
  </head>

  <body onload="main()">
    <p>
      <canvas id="webgl" width="400" height="400">
      Please use a browser that supports "canvas"
      </canvas>
    </p>
    <p>
      <span id="fps">FPS: 0</span>
    </p>
    <p>
      Camera Y Rotation <input type="range" min="0" max="360" value="0" class="slider" id="cameraSlide">
    </p>
    <p>
      Beak Open-ness <input type="range" min="0" max="40" value="0" class="slider" id="beakSlide">
    </p>
    <p>
      <br> <b>Wing Control</b> <br>
      Shoulder <input type="range" min="0" max="70" value="0" class="slider" id="shoulderSlide"><br>
      Mid-Wing <input type="range" min="0" max="40" value="0" class="slider" id="midWingSlide"><br>
      Wing Tip <input type="range" min="0" max="30" value="0" class="slider" id="wingTipSlide"><br>
    </p>
    <p>
      <br> <b>Leg Control</b> <br>
      Thigh <input type="range" min="-30" max="30" value="0" class="slider" id="thighSlide"><br>
      Calf <input type="range" min="-30" max="30" value="0" class="slider" id="calfSlide"><br>
      Foot <input type="range" min="-20" max="20" value="0" class="slider" id="footSlide"><br>
    </p>

    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="Triangle.js"></script>
    <script src="Cube.js"></script>
    <script src="HalfPyramid.js"></script>
    <script src="BlockyAnimals.js"></script>
  </body>
</html>
