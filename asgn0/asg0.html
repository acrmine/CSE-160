<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Draw a blue rectangle (canvas version)</title>
    </head>
    <body>
        <body onload="main()">
        <canvas id="example" width="400" height="400" style="background-color: black;">
            Please use a browser that supports "canvas"
        </canvas>
        <form>
            v1: x <input type="number" id="v1x" value="0"> y <input type="number" id="v1y" value="0"><br>
            v2: x <input type="number" id="v2x" value="0"> y <input type="number" id="v2y" value="0"><br>
            <input type="button" value="Draw" onclick="handleDrawEvent()"><br><br>
            Operation: <select id="operation">
                <option value="add">Add</option>
                <option value="subtract">Subtract</option>
                <option value="multiply">Multiply</option>
                <option value="divide">Divide</option>
                <option value="angle_between">Angle Between</option>
                <option value="area">Area</option>
                <option value="magnitude">Magnitude</option>
                <option value="normalize">Normalize</option>
            </select>
             Scalar: <input type="number" id="scalar" value="0"><br>
            <input type="button" value="Draw" onclick="handleDrawOperationEvent()">

        </form>
        <script src="lib/cuon-matrix-cse160.js"></script>
        <script src="asg0.js"></script>
    </body>
</html>
